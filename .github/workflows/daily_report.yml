name: 自选股每日日报
on:
  schedule:
    # 北京时间20:30 = UTC12:30
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # 手动触发测试
jobs:
  run-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      SENDKEY: ${{ secrets.SENDKEY }}
      DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: 打印时区校验
        run: date && python3 -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('Asia/Shanghai')))"

      - name: 运行日报脚本
        run: python3 stock_daily_report.py --now
