name: 自选股每日日报
on:
  schedule:
    # 北京时间20:30 = UTC12:30，但GitHub Actions免费账户存在5-7h调度延迟
    # 实测数据：所有定时任务被推迟至UTC18:00左右（北京时间次日凌晨2点）
    # 解决方案：将cron提前到UTC6:30（=北京时间14:30），6h延迟后约为北京时间20:30
    - cron: '30 6 * * 1-5'
    # 周五盘后补充推送：UTC 7:30（=北京时间15:30收盘后）
    # 6h延迟后约北京时间21:30，确保周五全天数据完整
    - cron: '30 7 * * 5'
  workflow_dispatch: # 手动触发测试
jobs:
  run-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      SENDKEY: ${{ secrets.SENDKEY }}
      DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: 打印时区校验
        run: date && python3 -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('Asia/Shanghai')))"

      - name: 运行日报脚本
        run: python3 stock_daily_report.py --now
