name: 自选股每日日报

on:
  schedule:
    # UTC 12:33 = 北京时间 20:30
    - cron: '33 12 * * 1-5'   # 周一到周五（A股交易日）
  workflow_dispatch:            # 允许手动触发（方便测试）

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: pip install requests

      - name: 运行日报脚本
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: python stock_daily_report.py
